workspace:
  base_branch: main
  dependency_policy: wait_for_pr_opened
agents:
  builder:
    type: codex-exec
    model: gpt-5.5
    sandbox: workspace-write
    extra_args:
    - --full-auto
    - -c
    - model_reasoning_effort="xhigh"
  critic:
    type: codex-exec
    model: gpt-5.5
    sandbox: workspace-write
    extra_args:
    - --full-auto
    - -c
    - model_reasoning_effort="xhigh"
  verifier:
    type: codex-exec
    model: gpt-5.5
    sandbox: workspace-write
    extra_args:
    - --full-auto
    - -c
    - model_reasoning_effort="xhigh"
  pr_reviewer:
    type: codex-review
    model: gpt-5.5
    base_branch: main
    extra_args:
    - -c
    - model_reasoning_effort="xhigh"
registry:
  remote_url: null
  auth_token: null
