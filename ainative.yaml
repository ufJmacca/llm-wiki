workspace:
  artifacts_dir: .ai-native/runs
  specs_dir: specs
  base_branch: main
  parallel_mode: independent_only
  parallel_workers: 4
  worktrees_dir: .ai-native/worktrees
  dependency_policy: wait_for_pr_opened
  parallel_overlap_policy: path_prefix_block
  question_budget_per_stage: 3
  question_budget_per_run: 9
  plan_max_attempts: 6
  architecture_max_attempts: 6
  prd_max_attempts: 10
  loop_max_attempts: 25
  verification_max_attempts: 10
  pr_review_max_attempts: 50
  mermaid_validate_command:
    - mmdc
  mermaid_validate_args:
    - --quiet

git:
  branch_prefix: codex
  conventional_prefix: feat
  pr_draft: true

agents:
  builder:
    type: codex-exec
    model: gpt-5.5
    sandbox: workspace-write
    extra_args:
    - --full-auto
    - -c
    - model_reasoning_effort="xhigh"
  critic:
    type: codex-exec
    model: gpt-5.5
    sandbox: workspace-write
    extra_args:
    - --full-auto
    - -c
    - model_reasoning_effort="xhigh"
  verifier:
    type: codex-exec
    model: gpt-5.5
    sandbox: workspace-write
    extra_args:
    - --full-auto
    - -c
    - model_reasoning_effort="xhigh"
  pr_reviewer:
    type: codex-review
    model: gpt-5.5
    base_branch: main
    extra_args:
    - -c
    - model_reasoning_effort="xhigh"
registry:
  remote_url: null
  auth_token: null
quality_gates:
  require_plan_approval: true
  require_diagram_approval: true
  require_prd_approval: true
  require_test_critique: true
  require_red_green_refactor: true
  require_pr_review_approval: true